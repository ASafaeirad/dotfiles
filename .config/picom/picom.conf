#################################
#       General Settings        #
#################################

backend = "egl";
vsync = true;
dbus = false;

# Slightly higher precision when presenting the frame; can help banding on gradients.
# Costs a bit of GPU; leave off if you prefer maximum speed.
dithered-present = false;

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

# More reliable focused-window detection on most EWMH window managers (i3, KDE, Xfce, etc.)
use-ewmh-active-win = true;

use-damage = true;
log-level = "warn";
show-all-xerrors = false;

# Bypass compositing for fullscreen opaque windows (lower latency for games / video).
# Can flicker when toggling fullscreen; raise delay if that happens.
unredir-if-possible = true;
unredir-if-possible-delay = 100;

# Uncomment if you use the proprietary NVIDIA driver and see sync artifacts with GLX + vsync.
# xrender-sync-fence = true;

#################################
#            Shadows            #
#################################

shadow = false;

#################################
#            Corners            #
#################################

corner-radius = 8;

#################################
#            Fading             #
#################################

fading = false;

#################################
#     Background blurring       #
#################################

blur-method = "none";
# blur-strength = 5;
# blur-background = true;

#################################
#        Per-window rules       #
#################################

rules: ({
  match = "window_type = 'tooltip'";
  shadow = true;
  full-shadow = false;
}, {
  match = "window_type = 'dock'    || "
          "window_type = 'desktop' || "
          "_GTK_FRAME_EXTENTS@";
  shadow = false;
}, {
  match = "fullscreen";
  corner-radius = 0;
}, {
  match = "class_g = 'flyterm' || "
          "class_g = 'Rofi'";
  opacity = 1;
})
