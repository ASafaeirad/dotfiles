$mainMod = SUPER
$hyper = $mainMod SHIFT CTRL ALT

# ---- Session / WM control ----
bind = $mainMod CTRL, r, exec, hyprctl reload
bind = $mainMod SHIFT, q, killactive
bind = $hyper, q, killactive

bind = $mainMod, h, exec, ~/.config/hypr/scripts/focus-or-unfullscreen l
bind = $mainMod, j, exec, ~/.config/hypr/scripts/focus-or-unfullscreen d
bind = $mainMod, k, exec, ~/.config/hypr/scripts/focus-or-unfullscreen u
bind = $mainMod, l, exec, ~/.config/hypr/scripts/focus-or-unfullscreen r

bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, j, movewindow, d
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, l, movewindow, r
bind = $mainMod CTRL, Return, layoutmsg, swapwithmaster

bind = $mainMod CTRL SHIFT, h, resizeactive, -50 0
bind = $mainMod CTRL SHIFT, l, resizeactive, 50 0
bind = $mainMod CTRL SHIFT, k, resizeactive, 0 -50
bind = $mainMod CTRL SHIFT, j, resizeactive, 0 50
bind = $mainMod CTRL SHIFT, c, centerwindow

bind = $mainMod, space, togglefloating
bind = $mainMod, f, fullscreen, 0
bind = $mainMod SHIFT, f, fullscreen, 1
bind = $mainMod CTRL SHIFT, f, fullscreenstate, 0 2
bind = $mainMod ,v, layoutmsg, orientationnext # rotate master orientation

bind = $mainMod, m, focusmonitor, +1
bind = $mainMod SHIFT, m, movewindow, mon:+1

# =========================================================================
# Workspaces
# =========================================================================
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, Backspace, workspace, previous

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, Backspace, movetoworkspace, previous

bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, t, exec, toggle-flyterm

bind = $mainMod, Return, exec, alacritty
bind = $mainMod, F2, exec, chromium
bind = $mainMod, F3, exec, code
bind = $mainMod, F4, exec, pcmanfm
bind = $mainMod, F5, exec, alacritty -e mus
bind = $mainMod, F9, exec, telegram-desktop
bind = $mainMod, n, exec, toggle-notion


bind = $mainMod, slash, exec, qs -c skill ipc call cheatsheet toggle
bind = $mainMod CTRL, w, exec, qs -c skill ipc call wallpaperSelector toggle
bind = $mainMod CTRL, period, exec, qs -c skill ipc call sidebarRight toggle
bind = $mainMod SHIFT, t, exec, flyterm

bind = $mainMod SHIFT, Space, exec, qs -c skill ipc call search toggle
bind = $mainMod SHIFT, v, exec, clip-menu
bind = $mainMod SHIFT, s, exec, power-menu
bind = $mainMod SHIFT, a, exec, auto-menu
bind = $mainMod SHIFT, b, exec, changelog-menu
bind = $mainMod SHIFT, c, exec, c-menu
bind = $mainMod SHIFT, d, exec, s-menu
bind = $mainMod SHIFT, p, exec, p-menu
bind = $mainMod SHIFT, g, exec, github-menu
bind = $mainMod SHIFT, o, exec, open-menu
bind = $mainMod SHIFT, w, exec, wifi-menu
bind = $mainMod SHIFT, y, exec, youtube-menu
bind = $mainMod SHIFT, i, exec, screen-menu
bind = $mainMod SHIFT, x, exec, dev-menu

bind = $mainMod CTRL, x, exec, hyprctl kill # was xkill
bind = $mainMod CTRL, m, exec, pavucontrol
bind = $mainMod CTRL, c, exec, hyprpicker -a
bind = $mainMod CTRL, b, exec, book
bind = $mainMod CTRL, n, exec, notion-app
bind = $mainMod CTRL, s, exec, ocr
bind = $mainMod CTRL, q, exec, qbar
bind = $mainMod CTRL, t, exec, ocr en
bind = $mainMod CTRL, p, exec, qs -c skill ipc call region screenshot

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
