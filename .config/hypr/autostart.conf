exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
# polkit agent is provided by the Quickshell (skill) shell - don't start polkit-gnome (it would win the registration race and block the shell's agent).
# If you stop using the shell, re-add polkit-gnome here.
exec-once = gnome-keyring-daemon --start --components=secrets,ssh
exec-once = import-gsettings

exec-once = wl-paste --type text --watch clipvault store
exec-once = wl-paste --type image --watch clipvault store
exec-once = hyprsunset -t 4500
exec-once = hypridle

exec-once = qs -c skill
exec-once = flyterm
exec-once = notion-app
